basePath: /
definitions:
  api.GenerateKeyRequest:
    properties:
      email:
        example: user@example.com
        type: string
      label:
        example: Production
        type: string
      scopes:
        description: Optional scopes for this key (read|write|export|admin). Defaults to read,write,export.
        items:
          type: string
        type: array
    type: object
  api.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: securepassword123
        type: string
    type: object
  api.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: securepassword123
        type: string
    type: object
  api.ResetConfirmRequest:
    properties:
      email:
        example: user@example.com
        type: string
      new_password:
        example: newsecurepassword456
        type: string
      token:
        example: a1b2c3
        type: string
    type: object
  api.ResetRequest:
    properties:
      email:
        example: user@example.com
        type: string
    type: object
  api.sessionInfo:
    properties:
      id:
        type: string
    type: object
  core.ExplanationNode:
    properties:
      children:
        items:
          $ref: '#/definitions/core.ExplanationNode'
        type: array
      factID:
        type: string
    type: object
  core.Fact:
    properties:
      id:
        type: string
      idom:
        description: Dominator Tree
        type: string
      justification_sets:
        description: OR-of-AND justification (for API/Journal backwards compatibility)
        items:
          items:
            type: string
          type: array
        type: array
      metadata:
        additionalProperties: true
        description: Internal system metadata (ignored by schema validation)
        type: object
      payload:
        additionalProperties: true
        description: Arbitrary belief payload (validated against user schema)
        type: object
      postOrder:
        type: integer
      preOrder:
        type: integer
      validation_errors:
        description: Schema Validation
        items:
          type: string
        type: array
      resolved_status:
        type: number
        format: float64
      is_root:
        type: boolean
      manual_status:
        type: number
        format: float64
      derived_status:
        type: number
        format: float64
      valid_justification_count:
        type: integer
    type: object
  core.ImpactReport:
    properties:
      action_count:
        type: integer
      direct_count:
        type: integer
      epistemic_loss:
        type: number
      impacted_ids:
        items:
          type: string
        type: array
      total_count:
        type: integer
    type: object
  store.APIKey:
    properties:
      created_at:
        type: integer
      expires_at:
        type: integer
      id:
        description: Stable key identifier (sha256 hex of the raw key).
        type: string
      is_revoked:
        type: boolean
      key:
        description: Raw API key. Returned only on create/rotate; not persisted in plaintext.
        type: string
      key_last4:
        description: Redacted display helper for UI/logging.
        type: string
      key_prefix:
        description: Redacted display helper for UI/logging.
        type: string
      label:
        type: string
      last_used_at:
        type: integer
      scopes:
        description: Optional scopes for this key (read|write|export|admin).
        items:
          type: string
        type: array
    type: object
  store.AccessLogEntry:
    properties:
      actor_id:
        type: string
      actor_role:
        type: string
      created_at:
        type: integer
      duration_ms:
        type: integer
      id:
        type: string
      ip:
        type: string
      method:
        type: string
      path:
        type: string
      pattern:
        type: string
      status:
        type: integer
      trace_id:
        type: string
      user_agent:
        type: string
    type: object
  api.PagedAccessLogs:
    properties:
      items:
        items:
          $ref: '#/definitions/store.AccessLogEntry'
        type: array
      next_cursor:
        type: string
    type: object
  store.EventType:
    enum:
    - assert
    - invalidate
    - cycle_violation
    - snapshot_corruption
    - confidence_adjusted
    - revalidation_complete
    - admin_action
    - decision_record
    type: string
    x-enum-varnames:
    - EventAssert
    - EventInvalidate
    - EventCycleViolation
    - EventSnapshotCorruption
    - EventConfidenceAdjusted
    - EventRevalidationComplete
    - EventAdminAction
    - EventDecisionRecord
  store.JournalEntry:
    properties:
      actor_id:
        type: string
      fact:
        $ref: '#/definitions/core.Fact'
      fact_id:
        type: string
      payload:
        additionalProperties: true
        type: object
      session_id:
        type: string
      timestamp:
        type: integer
      type:
        $ref: '#/definitions/store.EventType'
    type: object
  api.ExportJob:
    properties:
      id:
        type: string
      session_id:
        type: string
      format:
        type: string
      status:
        type: string
      error:
        type: string
      created_at:
        type: integer
      completed_at:
        type: integer
      size_bytes:
        type: integer
      filename:
        type: string
      content_type:
        type: string
      download_url:
        type: string
    type: object
  api.ExportJobCreateRequest:
    properties:
      format:
        description: csv|pdf
        type: string
    type: object
  store.SessionConfig:
    properties:
      enforcement_mode:
        example: strict
        type: string
      schema:
        example: '{"type": "object"}'
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@velarix.dev
    name: API Support
    url: http://velarix.dev/support
  description: Decision integrity API for AI-assisted internal approvals. Velarix records facts, tracks causal dependencies, and invalidates stale reasoning before downstream actions are taken.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://velarix.dev/terms/
  title: Velarix API
  version: 0.1.0
paths:
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return a JWT for console access. No authentication
        required.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.LoginRequest'
      produces:
      - application/json
      responses:
        '200':
          description: token
          schema:
            additionalProperties:
              type: string
            type: object
        '401':
          description: invalid credentials
          schema:
            type: string
      summary: Login user
      tags:
      - Auth
  /v1/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with Argon2id password hashing. No authentication
        required.
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.RegisterRequest'
      produces:
      - application/json
      responses:
        '201':
          description: user created
          schema:
            additionalProperties:
              type: string
            type: object
        '400':
          description: invalid request
          schema:
            type: string
        '500':
          description: internal error
          schema:
            type: string
      summary: Register a new user
      tags:
      - Auth
  /v1/auth/reset-confirm:
    post:
      consumes:
      - application/json
      description: Update password using a reset token provided via console logs.
        No authentication required.
      parameters:
      - description: Reset details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ResetConfirmRequest'
      produces:
      - application/json
      responses:
        '200':
          description: status
          schema:
            additionalProperties:
              type: string
            type: object
        '401':
          description: invalid token
          schema:
            type: string
      summary: Confirm password reset
      tags:
      - Auth
  /v1/auth/reset-request:
    post:
      consumes:
      - application/json
      description: Generate a reset token and log it to the server console. No authentication
        required.
      parameters:
      - description: User email
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ResetRequest'
      produces:
      - application/json
      responses:
        '200':
          description: status
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Request password reset
      tags:
      - Auth
  /health:
    get:
      description: Basic status, version, and uptime for monitoring.
      responses:
        '200':
          description: health status
          schema:
            additionalProperties: true
            type: object
      summary: System health check
      tags:
      - System
  /health/full:
    get:
      description: Detailed system status including disk and RAM sessions. Requires
        admin role.
      responses:
        '200':
          description: full health status
          schema:
            additionalProperties: true
            type: object
        '403':
          description: forbidden
          schema:
            type: string
      security:
      - Bearer: []
      summary: Full system health check
      tags:
      - System
  /v1/keys:
    get:
      consumes:
      - application/json
      description: Retrieve all API keys associated with the user. Admin role required.
      parameters: []
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.APIKey'
            type: array
        '401':
          description: unauthorized
          schema:
            type: string
        '403':
          description: forbidden
          schema:
            type: string
        '404':
          description: user not found
          schema:
            type: string
      security:
      - Bearer: []
      summary: List API keys
      tags:
      - Auth
  /v1/org/access-logs:
    get:
      description: Paged access logs for the organization. Restricted to auditor/admin via `export` scope.
      parameters:
      - description: Pagination cursor (from previous response).
        in: query
        name: cursor
        required: false
        type: string
      - description: Page size (max 500).
        in: query
        name: limit
        required: false
        type: integer
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/api.PagedAccessLogs'
        '401':
          description: unauthorized
          schema:
            type: string
        '403':
          description: forbidden
          schema:
            type: string
      security:
      - Bearer: []
      summary: List org access logs
      tags:
      - Org
  /v1/keys/{key}:
    delete:
      consumes:
      - application/json
      description: Mark an API key as revoked. Revoked keys return 401.
      parameters:
      - description: Key identifier (sha256 hex). For backwards compatibility, legacy raw keys may still be accepted.
        example: '"b7c3f5...sha256hex..."'
        in: path
        name: key
        required: true
        type: string
      - description: Optional idempotency key for safe retries.
        in: header
        name: Idempotency-Key
        required: false
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: status
          schema:
            additionalProperties:
              type: string
            type: object
        '401':
          description: unauthorized
          schema:
            type: string
        '404':
          description: key not found
          schema:
            type: string
      security:
      - Bearer: []
      summary: Revoke an API key
      tags:
      - Auth
  /v1/keys/{key}/rotate:
    post:
      consumes:
      - application/json
      description: Revokes the old key and generates a new one with the same label.
        Requires admin role.
      parameters:
      - description: Old key identifier (sha256 hex). For backwards compatibility, legacy raw keys may still be accepted.
        example: '"b7c3f5...sha256hex..."'
        in: path
        name: key
        required: true
        type: string
      - description: Optional idempotency key for safe retries.
        in: header
        name: Idempotency-Key
        required: false
        type: string
      produces:
      - application/json
      responses:
        '201':
          description: key rotated
          schema:
            $ref: '#/definitions/store.APIKey'
        '401':
          description: unauthorized
          schema:
            type: string
        '403':
          description: forbidden
          schema:
            type: string
        '404':
          description: key not found
          schema:
            type: string
      security:
      - Bearer: []
      summary: Rotate an API key
      tags:
      - Auth
  /v1/keys/generate:
    post:
      consumes:
      - application/json
      description: Create a new labeled API key for the user. Supports optional scoped keys (read|write|export|admin).
      parameters:
      - description: Key details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.GenerateKeyRequest'
      - description: Optional idempotency key for safe retries.
        in: header
        name: Idempotency-Key
        required: false
        type: string
      produces:
      - application/json
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/store.APIKey'
        '400':
          description: invalid request
          schema:
            type: string
        '403':
          description: forbidden
          schema:
            type: string
        '404':
          description: user not found
          schema:
            type: string
      security:
      - Bearer: []
      summary: Generate a new API key
      tags:
      - Auth
  /v1/org/usage:
    get:
      description: Retrieve atomic metrics for the requesting organization.
      responses:
        '200':
          description: usage metrics
          schema:
            additionalProperties:
              format: int64
              type: integer
            type: object
      security:
      - Bearer: []
      summary: Get organization usage
      tags:
      - System
  /v1/s/{session_id}/events:
    get:
      description: Server-Sent Events (SSE) stream for real-time belief updates.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      responses:
        '200':
          description: event stream
          schema:
            type: string
      security:
      - Bearer: []
      summary: Stream session events
      tags:
      - Facts
  /v1/s/{session_id}/export:
    get:
      description: Generate a CSV or PDF export of the session history with integrity metadata (including a journal chain head). Requires export scope.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: 'Format: csv or pdf'
        in: query
        name: format
        required: true
        type: string
      responses:
        '200':
          description: exported file
          schema:
            type: string
      security:
      - Bearer: []
      summary: Export audit log
      tags:
      - History
  /v1/s/{session_id}/export-jobs:
    get:
      description: List async export jobs for a session. Requires export scope.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: list of export jobs
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List export jobs
      tags:
      - History
    post:
      consumes:
      - application/json
      description: Create an async export job (csv|pdf). Requires export scope.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Export job create request
        in: body
        name: request
        required: false
        schema:
          $ref: '#/definitions/api.ExportJobCreateRequest'
      - description: Optional idempotency key for safe retries.
        in: header
        name: Idempotency-Key
        required: false
        type: string
      produces:
      - application/json
      responses:
        '201':
          description: export job created
          schema:
            $ref: '#/definitions/api.ExportJob'
      security:
      - Bearer: []
      summary: Create export job
      tags:
      - History
  /v1/s/{session_id}/export-jobs/{id}:
    get:
      description: Get export job status. When done, response includes download_url. Requires export scope.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Export job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: export job status
          schema:
            $ref: '#/definitions/api.ExportJob'
      security:
      - Bearer: []
      summary: Get export job
      tags:
      - History
  /v1/s/{session_id}/export-jobs/{id}/download:
    get:
      description: Download an export job result (only when status=done). Requires export scope.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Export job ID
        in: path
        name: id
        required: true
        type: string
      responses:
        '200':
          description: exported file
          schema:
            type: string
      security:
      - Bearer: []
      summary: Download export job
      tags:
      - History
  /v1/s/{session_id}/facts:
    get:
      description: Retrieve all facts, optionally filtering for only logically 'Valid'
        ones.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Only return valid facts
        in: query
        name: valid
        type: boolean
      responses:
        '200':
          description: list of facts
          schema:
            items:
              $ref: '#/definitions/core.Fact'
            type: array
      security:
      - Bearer: []
      summary: List all facts in a session
      tags:
      - Facts
    post:
      consumes:
      - application/json
      description: Add a new fact to the reasoning graph. If root, it is manual. If
        derived, it requires justification sets.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Fact definition
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/core.Fact'
      - description: Optional idempotency key for safe retries.
        in: header
        name: Idempotency-Key
        required: false
        type: string
      produces:
      - application/json
      responses:
        '201':
          description: fact created
          schema:
            $ref: '#/definitions/core.Fact'
        '400':
          description: invalid request
          schema:
            type: string
        '403':
          description: unauthorized
          schema:
            type: string
      security:
      - Bearer: []
      summary: Assert a new fact
      tags:
      - Facts
  /v1/s/{session_id}/config:
    post:
      consumes:
      - application/json
      description: Update session-specific settings like JSON schema and enforcement
        mode.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: New configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/store.SessionConfig'
      - description: Optional idempotency key for safe retries.
        in: header
        name: Idempotency-Key
        required: false
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: config updated
          schema:
            $ref: '#/definitions/store.SessionConfig'
        '400':
          description: invalid request
          schema:
            type: string
        '403':
          description: unauthorized
          schema:
            type: string
      security:
      - Bearer: []
      summary: Update session config
      tags:
      - Sessions
  /v1/s/{session_id}/facts/{id}:
    get:
      description: Retrieve a fact by its ID within a session.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Fact ID
        in: path
        name: id
        required: true
        type: string
      responses:
        '200':
          description: fact details
          schema:
            $ref: '#/definitions/core.Fact'
        '404':
          description: fact not found
          schema:
            type: string
      security:
      - Bearer: []
      summary: Get a single fact
      tags:
      - Facts
  /v1/s/{session_id}/facts/{id}/impact:
    get:
      description: Calculate the downstream effect of retracting a specific fact.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Fact ID
        in: path
        name: id
        required: true
        type: string
      responses:
        '200':
          description: impact report
          schema:
            $ref: '#/definitions/core.ImpactReport'
      security:
      - Bearer: []
      summary: Analyze impact
      tags:
      - Analysis
  /v1/s/{session_id}/facts/{id}/invalidate:
    post:
      description: Manually invalidate a root premise, triggering a causal collapse
        of all dependents.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Fact ID
        in: path
        name: id
        required: true
        type: string
      - description: Optional idempotency key for safe retries.
        in: header
        name: Idempotency-Key
        required: false
        type: string
      responses:
        '200':
          description: status invalidated
          schema:
            additionalProperties:
              type: string
            type: object
        '403':
          description: unauthorized
          schema:
            type: string
      security:
      - Bearer: []
      summary: Invalidate a root fact
      tags:
      - Facts
  /v1/s/{session_id}/facts/{id}/why:
    get:
      description: Retrieve the justification tree for a specific fact.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Fact ID
        in: path
        name: id
        required: true
        type: string
      responses:
        '200':
          description: explanation tree
          schema:
            $ref: '#/definitions/core.ExplanationNode'
      security:
      - Bearer: []
      summary: Explain a fact
      tags:
      - Analysis
  /v1/s/{session_id}/history:
    get:
      description: Retrieve the full chronological journal for a session.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      responses:
        '200':
          description: audit trail
          schema:
            items:
              $ref: '#/definitions/store.JournalEntry'
            type: array
      security:
      - Bearer: []
      summary: Get session history
      tags:
      - History
    post:
      description: Append an event to the session audit trail. Supports decision_record events (type=decision_record) for structured decision records.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Event to append
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/store.JournalEntry'
      - description: Optional idempotency key for safe retries.
        in: header
        name: Idempotency-Key
        required: false
        type: string
      responses:
        '201':
          description: event appended
          schema:
            $ref: '#/definitions/store.JournalEntry'
      security:
      - Bearer: []
      summary: Append to journal
      tags:
      - History
  /v1/s/{session_id}/revalidate:
    post:
      description: Clear the engine and replay the full journal through all validation
        rules. Returns an impact summary.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Optional idempotency key for safe retries.
        in: header
        name: Idempotency-Key
        required: false
        type: string
      responses:
        '200':
          description: revalidation summary
          schema:
            additionalProperties:
              type: integer
            type: object
      security:
      - Bearer: []
      summary: Revalidate entire session
      tags:
      - Analysis
  /v1/s/{session_id}/slice:
    get:
      description: Retrieve the logically valid subset of facts formatted for LLM
        consumption.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: 'Format: json or markdown'
        in: query
        name: format
        type: string
      - description: Max facts to return
        in: query
        name: max_facts
        type: integer
      responses:
        '200':
          description: facts slice
          schema:
            items: {}
            type: array
